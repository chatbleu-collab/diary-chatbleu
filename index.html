<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>나의 다이어리</title>
  <meta name="description" content="완전 오프라인 다이어리 — 사진, 오디오, 펜 드로잉 지원">
  <meta name="theme-color" content="#8a6d4b">
  <!-- PWA 매니페스트 / 아이콘 -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="stylesheet" href="app.css">
</head>
<body>

  <!-- ===== 홈: 월간 달력 ===== -->
  <div id="view-calendar" class="view">
    <!-- 일기 내용 검색 -->
    <div class="search-wrap">
      <span class="search-icon" aria-hidden="true">🔍</span>
      <input id="search-input" type="search" placeholder="일기 검색"
             autocomplete="off" aria-label="일기 검색">
      <button id="search-clear" type="button" aria-label="검색어 지우기">✕</button>
    </div>
    <div id="search-results" class="search-results hidden"></div>

    <header class="cal-header">
      <button id="btn-prev" type="button" aria-label="이전 달">‹</button>
      <h1 id="cal-title">달력</h1>
      <button id="btn-next" type="button" aria-label="다음 달">›</button>
      <button id="btn-today" type="button" class="btn-today">오늘</button>
    </header>
    <div class="cal-weekdays">
      <span class="sun">일</span><span>월</span><span>화</span><span>수</span>
      <span>목</span><span>금</span><span class="sat">토</span>
    </div>
    <div id="cal-grid" class="cal-grid"></div>
    <p class="cal-hint">날짜를 누르면 그날의 일기가 열립니다 · 점은 일기가 있는 날</p>

    <!-- 백업 / 복원 -->
    <div class="backup-bar">
      <button id="btn-backup" type="button">💾 백업 다운로드</button>
      <button id="btn-restore" type="button">📂 복원</button>
    </div>
  </div>

  <!-- ===== 일기 에디터 ===== -->
  <div id="view-editor" class="view hidden">
    <header class="ed-header">
      <button id="btn-back" type="button" aria-label="달력으로">‹</button>
      <h2 id="ed-title"></h2>
      <span id="save-state" class="save-state" aria-live="polite"></span>
    </header>

    <!-- 도구 모음 -->
    <div class="ed-toolbar">
      <button id="btn-photo" type="button" title="사진 추가">🖼 사진</button>
      <button id="btn-audio" type="button" title="오디오 추가">🎵 오디오</button>
      <button id="btn-file" type="button" title="파일 첨부">📎 파일</button>
      <button id="btn-draw" type="button" title="펜 드로잉">✏️ 그리기</button>
      <span class="tb-sep"></span>
      <button class="fmt-btn" data-cmd="bold" type="button" title="굵게"><b>B</b></button>
      <button class="fmt-btn" data-cmd="italic" type="button" title="기울임"><i>I</i></button>
      <button class="fmt-btn" data-cmd="underline" type="button" title="밑줄"><u>U</u></button>
      <button id="btn-color" class="fmt-btn" type="button" title="글자 색"><span id="color-a" class="color-a">A</span></button>
      <input type="color" id="fmt-color" value="#e74c3c" hidden>
    </div>

    <!-- 일기 시트: 항목(페이지) 블록 스택 + 드로잉 오버레이
         각 블록 = 1줄 날짜/시간 헤더, 2줄 날씨|미세먼지, 그 아래 본문 -->
    <div id="sheet" class="sheet">
      <div id="blocks" class="blocks"></div>

      <!-- 펜 드로잉 오버레이 (그리기 모드에서만 입력 활성화) -->
      <canvas id="draw-canvas" class="draw-canvas"></canvas>
    </div>

    <!-- 드로잉 도구 (그리기 모드에서 표시) -->
    <div id="draw-tools" class="draw-tools hidden">
      <button class="pen-color on" data-color="#222222" style="--c:#222222" type="button" aria-label="검정"></button>
      <button class="pen-color" data-color="#e74c3c" style="--c:#e74c3c" type="button" aria-label="빨강"></button>
      <button class="pen-color" data-color="#2f6fdb" style="--c:#2f6fdb" type="button" aria-label="파랑"></button>
      <button class="pen-color" data-color="#27ae60" style="--c:#27ae60" type="button" aria-label="초록"></button>
      <button class="pen-color" data-color="#f1c40f" style="--c:#f1c40f" type="button" aria-label="노랑"></button>
      <input id="pen-size" type="range" min="1" max="20" value="3" aria-label="펜 굵기">
      <button id="btn-eraser" type="button">지우개</button>
      <button id="btn-undo" type="button">되돌리기</button>
      <button id="btn-draw-done" type="button" class="done">완료</button>
    </div>
  </div>

  <!-- 공용 요소 -->
  <div id="toast" class="toast" role="status"></div>
  <input type="file" id="file-photo" accept="image/*" multiple hidden>
  <input type="file" id="file-audio" accept="audio/*" multiple hidden>
  <input type="file" id="file-any" multiple hidden>
  <input type="file" id="file-restore" accept=".json,application/json" hidden>

  <!-- 스크립트 (순서 중요: db → editor → app) -->
  <script src="db.js"></script>
  <script src="editor.js"></script>
  <script src="app.js"></script>
</body>
</html>
